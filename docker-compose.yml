services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Local best.pt is gitignored; mount from your machine after training.
      - ./runs/detect/checkbox/weights/best.pt:/app/runs/detect/checkbox/weights/best.pt:ro
    environment:
      PORT: "8080"
      # YOLO cold-starts a new Python+torch process per request; allow headroom on CPU.
      DETECTOR_TIMEOUT: "300s"
      DETECTOR_PYTHON: "python3"
      DETECTOR_SCRIPT: "/app/scripts/detect_checkboxes_yolo.py"
      DETECTOR_CONF: "0.35"
      DETECTOR_WEIGHTS: "/app/runs/detect/checkbox/weights/best.pt"
      # Browser dashboard on another origin (e.g. Render static); * is fine for local demos.
      CORS_ALLOW_ORIGINS: "*"
